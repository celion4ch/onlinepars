<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LiveBall — Трансляция</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
        .hdr{background:linear-gradient(135deg,#1a1a2e,#16213e);padding:6px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.1);min-height:36px;flex-shrink:0}
        .logo{font-size:16px;font-weight:800;background:linear-gradient(135deg,#ff4444,#ff8800);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .mi{font-size:11px;color:rgba(255,255,255,.7);text-align:right;max-width:65%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .lb{display:inline-flex;align-items:center;gap:3px;background:#e53935;color:#fff;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:700}
        .lb::before{content:'';width:5px;height:5px;background:#fff;border-radius:50%;animation:p 1.5s infinite}
        @keyframes p{0%,100%{opacity:1}50%{opacity:.3}}
        .pc{flex:1;position:relative;background:#000;display:flex;align-items:center;justify-content:center}
        video{width:100%;height:100%;object-fit:contain;background:#000}
        .wm{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:36px;font-weight:900;color:rgba(255,68,68,.06);letter-spacing:6px;pointer-events:none;z-index:10;user-select:none}
        .ld{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
        .sp{width:36px;height:36px;border:3px solid rgba(255,255,255,.1);border-top-color:#ff4444;border-radius:50%;animation:s 1s linear infinite;margin:0 auto 10px}
        @keyframes s{to{transform:rotate(360deg)}}
        .er{text-align:center;padding:30px;color:rgba(255,255,255,.6);font-size:13px}
        .er a{color:#ff4444;text-decoration:none;font-weight:600;display:inline-block;margin-top:10px}
    </style>
</head>
<body>
<div class="hdr"><div class="logo">LIVEBALL</div><div class="mi"><span class="lb">LIVE</span> <span id="t"></span></div></div>
<div class="pc">
    <video id="v" controls autoplay playsinline></video>
    <div class="wm">LIVEBALL</div>
    <div class="ld" id="ld"><div class="sp"></div><div style="color:rgba(255,255,255,.5);font-size:12px">Загрузка...</div></div>
</div>
<script>
const tg=window.Telegram?.WebApp;if(tg){tg.ready();tg.expand();tg.setHeaderColor('#000');tg.setBackgroundColor('#000')}
const P=new URLSearchParams(location.search),S=P.get('stream'),F=P.get('fallback')||'',T=P.get('teams')||'';
document.getElementById('t').textContent=T?' '+T:'';
const v=document.getElementById('v'),ld=document.getElementById('ld');
function err(m){ld.innerHTML='<div class="er"><p>'+m+'</p>'+(F?'<a href="'+F+'" target="_blank">Открыть на сайте ↗</a>':'')+'</div>'}
if(S){
    if(Hls.isSupported()){const h=new Hls({maxBufferLength:30});h.loadSource(S);h.attachMedia(v);h.on(Hls.Events.MANIFEST_PARSED,()=>{ld.style.display='none';v.play().catch(()=>{})});h.on(Hls.Events.ERROR,(e,d)=>{if(d.fatal)err('Не удалось загрузить')})}
    else if(v.canPlayType('application/vnd.apple.mpegurl')){v.src=S;v.addEventListener('loadedmetadata',()=>{ld.style.display='none';v.play()})}
    else err('Браузер не поддерживает HLS');
    setTimeout(()=>{if(ld.style.display!=='none')err('Долгая загрузка...')},20000)
}else err('Трансляция недоступна')
</script>
</body>
</html>
