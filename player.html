<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LiveBall — Трансляция</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
        
        .hdr{background:linear-gradient(135deg,#1a1a2e,#16213e);padding:6px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.1);min-height:36px;flex-shrink:0}
        .logo{font-size:16px;font-weight:800;background:linear-gradient(135deg,#ff4444,#ff8800);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .mi{font-size:11px;color:rgba(255,255,255,.7);text-align:right;max-width:65%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .lb{display:inline-flex;align-items:center;gap:3px;background:#e53935;color:#fff;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:700}
        .lb::before{content:'';width:5px;height:5px;background:#fff;border-radius:50%;animation:pulse 1.5s infinite}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
        
        /* Контейнер плеера */
        .pc{flex:1;position:relative;background:#000;overflow:hidden}
        
        /* Обёртка видео */
        .vw{position:relative;width:100%;height:100%;background:#000}
        video{width:100%;height:100%;object-fit:contain;background:#000}
        
        /* RUBOT — правый верхний угол, всегда поверх */
        .rubot{
            position:absolute;
            top:5px;right:5px;
            z-index:2147483647;
            pointer-events:none;
            user-select:none;
            display:flex;
            align-items:center;
            gap:4px;
            background:linear-gradient(135deg, rgba(255,68,68,0.92), rgba(255,120,0,0.92));
            padding:3px 8px;
            border-radius:5px;
            box-shadow:0 2px 8px rgba(0,0,0,0.6);
        }
        .rubot b{font-size:11px;font-weight:800;color:#fff;letter-spacing:1px}
        .rubot i{
            width:14px;height:14px;background:#fff;border-radius:3px;
            display:flex;align-items:center;justify-content:center;
            font-size:8px;font-weight:900;color:#ff4444;font-style:normal;
        }
        
        /* Fullscreen на .vw контейнере — RUBOT виден */
        .vw:fullscreen,
        .vw:-webkit-full-screen{
            width:100vw !important;height:100vh !important;background:#000;
        }
        .vw:fullscreen .rubot,
        .vw:-webkit-full-screen .rubot{
            display:flex !important;
            position:absolute !important;
            top:5px !important;right:5px !important;
            z-index:2147483647 !important;
        }
        
        /* Click guard убран — мешал fullscreen на мобиле */
        
        .ld{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:5}
        .sp{width:36px;height:36px;border:3px solid rgba(255,255,255,.1);border-top-color:#ff4444;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 10px}
        @keyframes spin{to{transform:rotate(360deg)}}
        .er{text-align:center;padding:30px;color:rgba(255,255,255,.6);font-size:13px}
        .er a{color:#ff4444;text-decoration:none;font-weight:600;display:inline-block;margin-top:10px}
    </style>
</head>
<body>
<div class="hdr">
    <div class="logo">LIVEBALL</div>
    <div class="mi"><span class="lb">LIVE</span> <span id="t"></span></div>
</div>
<div class="pc">
    <!-- Обёртка — именно она уходит в fullscreen -->
    <div class="vw" id="vw">
        <video id="v" controls autoplay playsinline></video>
        <div class="rubot"><i>R</i><b>RUBOT</b></div>
    </div>
    <div class="ld" id="ld">
        <div class="sp"></div>
        <div style="color:rgba(255,255,255,.5);font-size:12px">Загрузка...</div>
    </div>
</div>
<script>
const tg=window.Telegram?.WebApp;
if(tg){tg.ready();tg.expand();tg.setHeaderColor('#000');tg.setBackgroundColor('#000')}

const P=new URLSearchParams(location.search);
const S=P.get('stream');
const F=P.get('fallback')||'';
const T=P.get('teams')||'';
document.getElementById('t').textContent=T?' '+T:'';

const v=document.getElementById('v');
const ld=document.getElementById('ld');
const cg=document.getElementById('cg');

// Блокируем переходы на другие сайты
window.open=function(){return null};
document.addEventListener('click',function(e){
    var t=e.target;
    while(t&&t!==document){
        if(t.tagName==='A'&&t.href&&!t.href.includes(location.host)){
            e.preventDefault();e.stopPropagation();return;
        }
        t=t.parentElement;
    }
},true);

// Перехватываем fullscreen — делаем на .vw, не на video
// Так RUBOT остаётся виден
const vw=document.getElementById('vw');
v.addEventListener('dblclick',function(e){
    e.preventDefault();
    if(document.fullscreenElement||document.webkitFullscreenElement){
        (document.exitFullscreen||document.webkitExitFullscreen).call(document);
    } else {
        (vw.requestFullscreen||vw.webkitRequestFullscreen).call(vw);
    }
});

// Для мобилы: перехватываем нативный fullscreen запрос от video контролов
// и перенаправляем на .vw
var origReqFs = HTMLElement.prototype.requestFullscreen || HTMLElement.prototype.webkitRequestFullscreen;
if(origReqFs){
    HTMLVideoElement.prototype.requestFullscreen = function(){return origReqFs.call(vw)};
    if(HTMLVideoElement.prototype.webkitRequestFullscreen){
        HTMLVideoElement.prototype.webkitRequestFullscreen = function(){return origReqFs.call(vw)};
    }
    // iOS Safari
    if(HTMLVideoElement.prototype.webkitEnterFullscreen){
        HTMLVideoElement.prototype.webkitEnterFullscreen = function(){return origReqFs.call(vw)};
    }
}

function err(m){
    ld.innerHTML='<div class="er"><p>'+m+'</p>'+(F?'<a href="'+F+'" target="_blank">Смотреть на сайте ↗</a>':'')+'</div>';
}

if(S){
    const proxies=[
        S,
        'https://corsproxy.io/?'+encodeURIComponent(S),
        'https://api.allorigins.win/raw?url='+encodeURIComponent(S),
    ];
    let pi=0;
    function tryLoad(url){
        if(Hls.isSupported()){
            const h=new Hls({maxBufferLength:30,maxMaxBufferLength:60,xhrSetup:function(x){x.withCredentials=false}});
            h.loadSource(url);h.attachMedia(v);
            h.on(Hls.Events.MANIFEST_PARSED,()=>{ld.style.display='none';v.play().catch(()=>{})});
            h.on(Hls.Events.ERROR,(e,d)=>{if(d.fatal){h.destroy();pi++;if(pi<proxies.length)tryLoad(proxies[pi]);else err('Не удалось загрузить')}});
        }else if(v.canPlayType('application/vnd.apple.mpegurl')){
            v.src=url;
            v.addEventListener('loadedmetadata',()=>{ld.style.display='none';v.play()});
            v.addEventListener('error',()=>{pi++;if(pi<proxies.length)tryLoad(proxies[pi]);else err('Ошибка загрузки')});
        }else err('HLS не поддерживается');
    }
    tryLoad(proxies[0]);
    setTimeout(()=>{if(ld.style.display!=='none')err('Долгая загрузка...')},30000);
}else err('Трансляция недоступна');
</script>
</body>
</html>
