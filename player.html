<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LiveBall — Трансляция</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
        .hdr{background:linear-gradient(135deg,#1a1a2e,#16213e);padding:6px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.1);min-height:36px;flex-shrink:0}
        .logo{font-size:16px;font-weight:800;background:linear-gradient(135deg,#ff4444,#ff8800);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .mi{font-size:11px;color:rgba(255,255,255,.7);text-align:right;max-width:65%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .lb{display:inline-flex;align-items:center;gap:3px;background:#e53935;color:#fff;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:700}
        .lb::before{content:'';width:5px;height:5px;background:#fff;border-radius:50%;animation:pulse 1.5s infinite}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
        .pc{flex:1;position:relative;background:#000;display:flex;align-items:center;justify-content:center;overflow:hidden}
        .video-wrap{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center}
        video{width:100%;height:100%;object-fit:contain;background:#000}
        .rubot{
            position:absolute;
            z-index:9999;
            pointer-events:none;user-select:none;
            display:flex;align-items:center;gap:5px;
            background:linear-gradient(135deg,rgba(255,68,68,.95),rgba(255,120,0,.95));
            padding:6px 12px;border-radius:5px;
            box-shadow:0 2px 10px rgba(0,0,0,.7);
            top:5px;right:5px;
        }
        .rubot b{font-size:13px;font-weight:800;color:#fff;letter-spacing:1.5px}
        .rubot i{width:16px;height:16px;background:#fff;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;color:#ff4444;font-style:normal}
        .ld{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:5}
        .sp{width:36px;height:36px;border:3px solid rgba(255,255,255,.1);border-top-color:#ff4444;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 10px}
        @keyframes spin{to{transform:rotate(360deg)}}
        .er{text-align:center;padding:30px;color:rgba(255,255,255,.6);font-size:13px}
        .er a{color:#ff4444;text-decoration:none;font-weight:600;display:inline-block;margin-top:10px}
    </style>
</head>
<body>
<div class="hdr">
    <div class="logo">LIVEBALL</div>
    <div class="mi"><span class="lb">LIVE</span> <span id="t"></span></div>
</div>
<div class="pc">
    <div class="video-wrap">
        <video id="v" controls autoplay playsinline></video>
        <div class="rubot" id="rubot"><i>R</i><b>RUBOT</b></div>
    </div>
    <div class="ld" id="ld">
        <div class="sp"></div>
        <div style="color:rgba(255,255,255,.5);font-size:12px">Загрузка...</div>
    </div>
</div>
<script>
var tg=window.Telegram&&window.Telegram.WebApp;
if(tg){tg.ready();tg.expand();tg.setHeaderColor('#000');tg.setBackgroundColor('#000')}

var P=new URLSearchParams(location.search);
var S=P.get('stream');
var F=P.get('fallback')||'';
var T=P.get('teams')||'';
document.getElementById('t').textContent=T?' '+T:'';

var v=document.getElementById('v');
var ld=document.getElementById('ld');
var rb=document.getElementById('rubot');

// Блокируем переходы
window.open=function(){return null};
document.addEventListener('click',function(e){
    var t=e.target;
    while(t&&t!==document){
        if(t.tagName==='A'&&t.href&&!t.href.includes(location.host)){
            e.preventDefault();e.stopPropagation();return;
        }
        t=t.parentElement;
    }
},true);

// Позиционируем RUBOT на видео (учитывая object-fit:contain)
function posRubot(){
    var vw=v.videoWidth,vh=v.videoHeight;
    if(!vw||!vh){rb.style.top='5px';rb.style.right='5px';return}
    var cw=v.clientWidth,ch=v.clientHeight;
    var scale=Math.min(cw/vw,ch/vh);
    var realH=vh*scale,realW=vw*scale;
    var offY=(ch-realH)/2;
    var offX=(cw-realW)/2;
    rb.style.top=Math.round(offY+2)+'px';
    rb.style.right=Math.round(offX+2)+'px';
}
v.addEventListener('loadeddata',posRubot);
v.addEventListener('playing',posRubot);
v.addEventListener('resize',posRubot);
window.addEventListener('resize',posRubot);
setInterval(posRubot,500);

function err(m){
    ld.innerHTML='<div class="er"><p>'+m+'</p>'+(F?'<a href="'+F+'" target="_blank">Смотреть на сайте ↗</a>':'')+'</div>';
}

if(S){
    // Если stream URL относительный или абсолютный — используем как есть
    // Если это m3u8 — пропускаем через наш прокси (тот же сервер)
    var streamUrl = S;
    if(S.includes('.m3u8') && !S.includes('/stream?')){
        // Прямой m3u8 — пропускаем через прокси на этом же сервере
        streamUrl = '/stream?url=' + encodeURIComponent(S);
    }
    
    function startPlayer(url){
        if(Hls.isSupported()){
            var h=new Hls({maxBufferLength:30,maxMaxBufferLength:60,xhrSetup:function(x){x.withCredentials=false}});
            h.loadSource(url);h.attachMedia(v);
            h.on(Hls.Events.MANIFEST_PARSED,function(){ld.style.display='none';v.play().catch(function(){})});
            h.on(Hls.Events.ERROR,function(e,d){if(d.fatal){h.destroy();err('Не удалось загрузить')}});
        }else if(v.canPlayType('application/vnd.apple.mpegurl')){
            v.src=url;
            v.addEventListener('loadedmetadata',function(){ld.style.display='none';v.play()});
            v.addEventListener('error',function(){err('Ошибка загрузки')});
        }else err('HLS не поддерживается');
    }
    startPlayer(streamUrl);
    setTimeout(function(){if(ld.style.display!=='none')err('Долгая загрузка...')},30000);
}else err('Трансляция недоступна');
</script>
</body>
</html>
